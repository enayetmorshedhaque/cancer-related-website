<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <!-- Fontawesome CDN -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
        integrity="sha384-DyZ88mC6Up2uqS4h/KRgHuoeGwBcD4Ng9SiP4dIRy0EXTlnuz47vAwmeGwVChigm" crossorigin="anonymous">

    <!-- Theme CSS -->
    <link rel="stylesheet" href="assets/css/login-style.css">
</head>

<body>
    <section class="vh-100">
        <div class="container vh-100">
            <div class="row vh-100">
                <div class="col-12 my-auto">
                    <div class="card shadow rounded-0 border-0">
                        <div class="card-body py-5">
                            <div class="row align-items-center">
                                <div class="col-md-2"></div>
                                <div class="col-md-4">
                                    <img src="../assets/auth/Login/login.jpg" alt="Login Image" class="img-fluid" />
                                </div>
                                <div class="col-md-4">
                                    <div class="my-3 text-center">
                                        <h4 class="p-0 m-0">Welcome Back</h4>
                                    </div>
                                    <form onSubmit={handleLogin}>
                                        <div class="mb-3">
                                            <label class="form-label">Email</label>
                                            <input onBlur={handleOnBlur} name="email" type="email"
                                                class="form-control form-control-lg rounded-0"
                                                placeholder="john@doe.com" required />
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <input onBlur={handleOnBlur} name="password" type="password"
                                                class="form-control form-control-lg rounded-0"
                                                placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;"
                                                required />
                                        </div>
                                        <div class="d-flex align-items-baseline justify-content-between">
                                            <small>No account?
                                                <Link to="/register" class="text-decoration-none text-danger">Create
                                                Now</Link>
                                            </small>
                                            <button class="btn btn-outline-primary rounded-0">Login</button>
                                        </div>
                                    </form>
                                </div>
                                <div class="col-md-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Theme JS -->
    <script src="assets/js/login-page.js"></script>
    <!-- Bootstrap JS CDN -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script> -->
</body>

</html>
